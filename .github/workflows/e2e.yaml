name: E2E Test
on:
  repository_dispatch:
    types: [pubm-release]
  workflow_dispatch:
    inputs:
      pubm_version:
        description: "pubm version to test"
        default: "latest"

permissions:
  contents: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun add jsr pubm@${{ inputs.pubm_version || github.event.client_payload.pubm_version || 'latest' }} @pubm/core@${{ inputs.pubm_version || github.event.client_payload.pubm_version || 'latest' }}

      - name: Setup npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          echo "access=public" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set prerelease version
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION="0.0.1-e2e.${TIMESTAMP}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            for (const [dir, files] of [
              ['packages/core', ['package.json', 'jsr.json']],
              ['packages/utils', ['package.json']],
            ]) {
              for (const file of files) {
                const p = dir + '/' + file;
                const data = JSON.parse(fs.readFileSync(p, 'utf8'));
                data.version = '${VERSION}';
                fs.writeFileSync(p, JSON.stringify(data, null, 2));
              }
            }
          "
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" packages/cli/Cargo.toml

      - name: Commit version changes
        run: |
          git config user.name "pubm-bot"
          git config user.email "bot@pubm.dev"
          git add -A
          git commit -m "chore: bump version for e2e"

      - name: Publish
        run: bunx pubm --mode ci --phase publish --any-branch --skip-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Verify npm deployment
        run: |
          sleep 30
          npm view @pubm-test/multi-eco-core@${{ env.VERSION }}
          npm view @pubm-test/multi-eco-utils@${{ env.VERSION }}

      - name: Verify jsr deployment
        run: |
          BODY=$(curl -s "https://jsr.io/@syi0808/pubm-test-multi-eco-core/meta.json")
          STATUS=$(echo "$BODY" | grep -c "$VERSION" || true)
          if [ "$STATUS" = "0" ]; then
            echo "::error::Package version $VERSION not found on jsr"
            exit 1
          fi
          echo "Package verified on jsr"

      - name: Verify crates deployment
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/pubm-test-multi-eco-cli/${{ env.VERSION }}")
          if [ "$STATUS" = "0" ]; then
            echo "::error::Crate not found on crates.io (HTTP $STATUS)"
            exit 1
          fi
          echo "Crate verified on crates.io"
